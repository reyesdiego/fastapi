version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.4.1

jobs:
  test-oidc:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - aws-cli/setup:
          role_arn: ${AWS_OIDC_ROLE_ARN}
          region: ${AWS_REGION}
      - run:
          command: aws sts get-caller-identity

workflows:
  test:
    jobs:
      - test-oidc